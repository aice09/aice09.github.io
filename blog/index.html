---
layout: posts
title: My Blog
---
<div class="container blog">
  <h1 class="article-title" >{{ page.title }}</h1>
  <p class="title-sub">The lastest articles today.</p>
  <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 article-others">
      <!-- using the truncate filter -->
      <!--{% for post in site.posts limit:10 %}-->      
      <span class="post-date"><b>Article</b> {{ post.date | date: "%B %d, %Y" }}</span>
      <h2 class="article-title-inlist"><a href="{{ post.url }}">{{ post.title }}</a></h2>
      {% for tag in post.tags %}
      <span class="label-custom-aice09">#{{ tag }}</span>            
      {% endfor %}
      <p><a href="{{ post.url }}" class="article-link-inlist">Read Article <span uk-icon="icon: arrow-right"></span> </a></p>
     
      <hr>
      <!--{% endfor %}-->
  </div>      
  </ul>
</div>
